server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Generate request ID
    set $request_id $uri-$msec-$remote_addr-$remote_port;

    # Custom error pages
    error_page 400 /400.html;
    error_page 401 /400.html;
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 444 /444.html;
    error_page 500 501 502 503 504 /50x.html;

    location = /400.html { internal; }
    location = /403.html { internal; }
    location = /404.html { internal; }
    location = /429.html { internal; }
    location = /444.html { internal; }
    location = /50x.html { internal; }

    # Block suspicious requests early
    if ($suspicious_uri) { return 444; }
    if ($suspicious_query) { return 444; }

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_req zone=strict_limit burst=5 nodelay;

    # Allowed methods
    limit_except GET HEAD POST OPTIONS { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # OpenClaw gateway proxy (port 18789)
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req zone=prompt_limit burst=3 nodelay;
        proxy_pass http://openclaw:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-AI-Client "openclaw-gateway";
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_intercept_errors on;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://*.openai.com https://*.anthropic.com https://generativelanguage.googleapis.com https://aiplatform.googleapis.com https://*.aiplatform.googleapis.com https://language.googleapis.com https://*.language.googleapis.com ws: wss:; frame-ancestors 'none'; worker-src 'self' blob:; base-uri 'self';" always;
    }

    # WebSocket support for OpenClaw
    location /ws {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://openclaw:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-AI-Client "openclaw-ws";
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_intercept_errors on;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.openai.com https://api.anthropic.com https://generativelanguage.googleapis.com ws: wss:; frame-ancestors 'none';" always;
    }

    # OpenClaw UI static files
    location /ui/ {
        proxy_pass http://openclaw:18790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_cache_valid 200 1h;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        expires 1h;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Block sensitive paths
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ^/(\.git|\.env|node_modules|\.config) { deny all; return 404; }

    # Block exploits via query string (additional layer)
    if ($query_string ~* "(union|select|insert|update|delete|drop|exec|script|--|\.\.)") { return 444; }

    # Static asset caching with cache busting support
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        tcp_nodelay off;
    }

    # Deny access to backup/config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|old|orig|reveal|markdown|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
