# OpenClaw Podman Stack (Gemma 4 8B Optimized)
# Run: podman-compose up -d

services:
  ollama:
    image: openclaw-ollama:latest
    container_name: openclaw-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-14G}
        reservations:
          memory: ${OLLAMA_MEM_RESERVE:-4G}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
      - "${OPENCLAW_WEB_PORT:-18790}:18790"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./SOUL.md:/home/node/.openclaw/SOUL.md:ro
      - ./USER.md:/home/node/.openclaw/USER.md:ro
      - ./PLAYBOOK.md:/home/node/.openclaw/PLAYBOOK.md:ro
      - ./MEMORY.md:/home/node/.openclaw/MEMORY.md:ro
    env_file:
      - .env
    environment:
      - OPENCLAW_OLLAMA_URL=http://ollama:11434
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # read_only: true
    tmpfs:
      - /tmp
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${OPENCLAW_MEM_LIMIT:-4G}
        reservations:
          memory: ${OPENCLAW_MEM_RESERVE:-512M}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: openclaw-network
    driver: bridge

volumes:
  openclaw_data:
    name: openclaw_storage
  ollama_data:
    name: ollama_storage


