# Podman Compose - Security Hardened
# Compatible with docker-compose via podman-compose
# Run: podman-compose up -d
# Or: alias docker=podman && docker-compose up -d

version: "3.8"

services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    networks:
      - web_network
    depends_on:
      openclaw:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: "nginx"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_RESOURCE
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    log_opt:
      max-size: "10m"
      max-file: "3"
    podman:
      restart: always

  openclaw:
    image: localhost/openclaw:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - OPENCLAW_INSTALL_DOCKER_CLI=0
    networks:
      - web_network
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,size=256m
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    log_opt:
      max-size: "50m"
      max-file: "5"
    resources:
      limits:
        cpus: "2.0"
        memory: 1G
      reservations:
        cpus: "0.5"
        memory: 256M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    podman:
      restart: always

networks:
  web_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  nginx_logs:
  nginx_cache:
