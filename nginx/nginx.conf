user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_id bytes:$body_bytes_sent time:$request_time';

    log_format security '$remote_addr [$time_local] "$request" '
                        '$status "$http_referer" '
                        'threat_level=$sent_http_x_threat_level '
                        'req_id=$request_id';

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        '$request_id '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Generate request ID
    map $remote_addr $remote_addr_fixed {
        ~^(?<ip>.*?):\d+$ $ip;
        default $remote_addr;
    }

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 100;
    types_hash_max_size 2048;
    client_max_body_size 1M;
    client_body_buffer_size 128k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Request ID generation
    ssl_certificate /dev/null;
    ssl_certificate_key /dev/null;

    # Security
    ignore_invalid_headers on;
    merge_slashes off;
    underscores_in_headers on;
    server_name_in_redirect off;
    port_in_redirect off;

    # Connection handling
    reset_timedout_connection on;
    lingering_close on;
    lingering_time 10s;
    lingering_timeout 5s;

    # Security Headers (applied globally)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Download-Options "noopen" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # CSP - AI API endpoints (OpenAI, Anthropic, Google)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://*.openai.com https://*.anthropic.com https://generativelanguage.googleapis.com https://aiplatform.googleapis.com https://*.aiplatform.googleapis.com https://language.googleapis.com https://*.language.googleapis.com ws: wss:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; worker-src 'self' blob:;" always;

    # AI/LLM Service Headers
    add_header X-AI-Provider "openclaw" always;
    add_header X-API-Version "1.0" always;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=prompt_limit:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=1r/s;

    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn_zone $server_name zone=server:10m;

    # DDoS Protection
    limit_conn addr 20;
    limit_conn server 100;

    # Block suspicious patterns
    map $request_uri $suspicious_uri {
        default 0;
        ~*(\.\.|\.git|\.env|/\.|\/\.\.|\.md$|\.txt$|\.log$) 1;
        ~*(wp-admin|wp-login|phpmyadmin|xmlrpc\.php) 1;
    }

    map $query_string $suspicious_query {
        default 0;
        ~*(union\s+select|select\s+from|insert\s+into|delete\s+from|drop\s+table|exec\s*\(|<script|script:|\bjavascript:) 1;
        ~*(ignore\s+previous|disregard\s+instructions|forget\s+all|you\s+are\s+now) 1;
        ~*(pretend\s+to\s+be|DAN\s+mode|jailbreak|bypass\s+restriction) 1;
        ~*(new\s+system\s+prompt|override\s+previous|disable\s+safety) 1;
        ~*(\$\(.*\)|\$\{.*\}|`.*`) 1;
        ~*(<iframe|<object|<embed|<link|<style) 1;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/x-javascript;
    gzip_disable "msie6";
    gzip_http_version 1.1;

    # Brotli (if supported)
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Open file caching
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_redirect off;
    proxy_intercept_errors on;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Proxy buffers
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_temp_file_write_size 8k;
    proxy_max_temp_file_size 1024m;

    include /etc/nginx/conf.d/*.conf;
}
