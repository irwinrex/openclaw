<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 Bad Request</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
        .container { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 700; color: #e94560; text-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
        .error-title { font-size: 2rem; margin: 1rem 0; color: #fff; }
        .error-message { font-size: 1.1rem; color: #a0a0a0; margin-bottom: 2rem; }
        .home-link { display: inline-block; padding: 0.8rem 2rem; background: #e94560; color: #fff; text-decoration: none; border-radius: 5px; transition: all 0.3s ease; }
        .home-link:hover { background: #ff6b6b; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">400</div>
        <h1 class="error-title">Bad Request</h1>
        <p class="error-message">The request could not be understood or was missing required parameters.</p>
        <a href="/" class="home-link">Return Home</a>
    </div>
</body>
</html>
